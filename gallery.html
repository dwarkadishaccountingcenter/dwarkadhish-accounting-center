<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Portfolio | Dwarkadhish Accounting Center</title>
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        /* Global Reset and Variables - Cohesive Dark Mode */
        :root {
            --bg-color: #030712;
            --card-bg: #0b0f19;
            --primary-color: #090d16;
            --secondary-color: #0284c7;
            --text-color: #9ca3af;
            --headline-color: #ffffff;
            --border-color: rgba(255, 255, 255, 0.08);
            --whatsapp-color: #25d366;
            --facebook-color: #1877f2;
            --instagram-color: #e1306c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-color);
            overflow-x: hidden;
        }

        /* Modern Navigation Styling */
        header {
            background-color: var(--primary-color);
            border-bottom: 1px solid var(--border-color);
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-size: 22px; font-weight: 700; color: var(--headline-color); }

        .header-right { display: flex; align-items: center; gap: 30px; }

        .nav-links-container { display: flex; list-style: none; gap: 24px; }

        .nav-links-container a {
            text-decoration: none;
            color: #94a3b8;
            font-weight: 600;
            font-size: 15px;
            transition: color 0.3s ease;
        }

        .nav-links-container a:hover, .nav-links-container a.active { color: var(--secondary-color); }

        .social-icons-header { display: flex; align-items: center; gap: 12px; border-left: 1px solid var(--border-color); padding-left: 15px; }

        .social-icons-header a { font-size: 20px; text-decoration: none; }
        .social-icons-header .bi-whatsapp { color: var(--whatsapp-color); }
        .social-icons-header .bi-facebook { color: var(--facebook-color); }
        .social-icons-header .bi-instagram { color: var(--instagram-color); }

        /* Gallery Sections */
        .gallery-section { padding: 60px 8% 80px; text-align: center; }
        .section-title { font-size: 36px; color: var(--headline-color); margin-bottom: 12px; }
        .section-subtitle { font-size: 16px; margin-bottom: 40px; color: #64748b; }

        /* Overview Card */
        .overview-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-top: 4px solid var(--secondary-color);
            border-radius: 12px;
            padding: 35px;
            max-width: 650px;
            margin: 0 auto 50px;
            text-align: left;
        }

        /* Filter Controls */
        .filter-container { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 50px; }
        .filter-btn {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 10px 22px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
        }
        .filter-btn:hover, .filter-btn.active { background-color: var(--secondary-color); color: white; border-color: var(--secondary-color); }

        /* Portfolio Grid */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; }
        .gallery-item { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 30px; }
        .gallery-item.hidden { display: none !important; }
        
        /* Modal */
        .lightbox-modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(3, 7, 18, 0.95); justify-content: center; align-items: center; }
        .lightbox-content { max-width: 90%; max-height: 85%; border-radius: 8px; }
        .lightbox-close { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 40px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Dwarkadhish Accounting Center</div>
        <div class="header-right">
            <ul class="nav-links-container">
                <li><a href="index.html">Services</a></li>
                <li><a href="gallery.html" class="active">Gallery</a></li>
            </ul>
        </div>
    </header>

    <section class="gallery-section">
        <h2 class="section-title">Explore Specialized Options</h2>
        
        <div class="filter-container">
            <button class="filter-btn active" onclick="filterServices('all')">All Options</button>
            <button class="filter-btn" onclick="filterServices('insurance')">Insurance</button>
            <button class="filter-btn" onclick="filterServices('itr')">ITR</button>
            <!-- Add remaining buttons as needed -->
        </div>

        <div class="gallery-grid" id="portfolioGrid">
            <div class="gallery-item" data-category="insurance">
                <h3>Comprehensive Risk Coverage</h3>
                <div class="service-image-container">
                    <img src="insurance.jpeg" alt="Insurance" style="width:100%; cursor:pointer;" onclick="openLightbox(this.src)">
                </div>
            </div>
            <!-- Add other items here -->
        </div>
    </section>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox-modal" onclick="closeLightbox()">
        <span class="lightbox-close">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
    </div>

    <script>
        function filterServices(category) {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            const items = document.querySelectorAll('.gallery-item');
            items.forEach(item => {
                if (category === 'all' || item.getAttribute('data-category') === category) {
                    item.classList.remove('hidden');
                } else {
                    item.classList.add('hidden');
                }
            });
        }

        function openLightbox(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }
    </script>
</body>
</html>
