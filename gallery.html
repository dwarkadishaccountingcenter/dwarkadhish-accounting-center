<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery | DWARKADHISH ACCOUNTING CENTER</title>

<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:#f4f6f9;
}

header{
background:#0b2c52;
color:#fff;
padding:20px;
text-align:center;
}

header a{
color:white;
text-decoration:none;
margin:0 10px;
font-weight:bold;
}

.container{
width:90%;
margin:auto;
padding:30px 0;
}

h2{
text-align:center;
color:#0b2c52;
margin-bottom:30px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.gallery img{
width:100%;
height:350px;
object-fit:cover;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
transition:.3s;
cursor:pointer;
}

.gallery img:hover{
transform:scale(1.05);
}

footer{
background:#0b2c52;
color:white;
text-align:center;
padding:15px;
margin-top:40px;
}

.lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
justify-content:center;
align-items:center;
}

.lightbox img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

</style>
</head>

<body>

<header>

<h1>DWARKADHISH ACCOUNTING CENTER</h1>

<a href="index.html">Home</a>
<a href="gallery.html">Gallery</a>

</header>

<div class="container">

<h2>Our Services Gallery</h2>

<div class="gallery">

<img src="images/office.jpg.png" onclick="show(this.src)">
<img src="images/udyam.jpg.png" onclick="show(this.src)">
<img src="images/pan.jpg.jpeg" onclick="show(this.src)">
<img src="images/sip.jpg.png" onclick="show(this.src)">
<img src="images/passport.jpg.jpeg" onclick="show(this.src)">
<img src="images/insurance.jpg.jpeg" onclick="show(this.src)">
<img src="images/driving.jpg.jpeg" onclick="show(this.src)">
<img src="images/demat.jpg.png" onclick="show(this.src)">

</div>
</div>

</div>

<div class="lightbox" id="lightbox" onclick="hide()">
<img id="popup">
</div>

<footer>

© 2026 DWARKADHISH ACCOUNTING CENTER | Rajkot

</footer>

<script>

function show(src){
document.getElementById("lightbox").style.display="flex";
document.getElementById("popup").src=src;
}

function hide(){
document.getElementById("lightbox").style.display="none";
}

</script>

</body>
</html>
