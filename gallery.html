<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title><meta name="description" content="View our gallery at Dwarkadhish Accounting Center in Rajkot. Proudly serving local clients with professional ITR filing, GST compliance, and accounting services.">
<meta name="keywords" content="Accounting center Rajkot gallery, ITR in Rajkot photos, tax consultant Rajkot, GST accounting Rajkot office, financial services Rajkot"></title>

<style>
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    margin: 0;
    background: #f8fafc;
    color: #1e293b;
}

header {
    background: #0f172a;
    color: #fff;
    padding: 20px;
    text-align: center;
}

header a {
    color: #94a3b8;
    text-decoration: none;
    margin: 0 10px;
    font-weight: 600;
    transition: color 0.3s;
}

header a:hover {
    color: #fbbf24;
}

.container {
    width: 90%;
    margin: auto;
    padding: 30px 0;
}

h2 {
    text-align: center;
    color: #0f172a;
    margin-bottom: 30px;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
}

.gallery img {
    width: 100%;
    height: 350px;
    object-fit: cover;
    border-radius: 8px;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    transition: transform 0.3s, box-shadow 0.3s;
    cursor: pointer;
}

.gallery img:hover {
    transform: scale(1.03);
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
}

footer {
    background: #0f172a;
    color: #cbd5e1;
    text-align: center;
    padding: 15px;
    margin-top: 40px;
}

.lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
justify-content:center;
align-items:center;
}

.lightbox img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

</style>
</head>

<body>

<header>

<h1>DWARKADHISH ACCOUNTING CENTER</h1>

<a href="index.html">Home</a>
<a href="gallery.html">Gallery</a>

</header>

<div class="container">

<h2>Our Services Gallery</h2>

<div class="gallery">

<img src="office.jpg.png" onclick="show(this.src)">
<img src="udyam.jpg.png" onclick="show(this.src)">
<img src="pan.jpg.jpeg" onclick="show(this.src)">
<img src="sip.jpg.png" onclick="show(this.src)">
<img src="passport.jpg.jpeg" onclick="show(this.src)">
<img src="insurance.jpg.jpeg" onclick="show(this.src)">
<img src="driving.jpg.jpeg" onclick="show(this.src)">
<img src="demat.jpg.png" onclick="show(this.src)">
</div>
</div>

</div>

<div class="lightbox" id="lightbox" onclick="hide()">
<img id="popup">
</div>

<footer>

© 2026 DWARKADHISH ACCOUNTING CENTER | Rajkot

</footer>

<script>

function show(src){
document.getElementById("lightbox").style.display="flex";
document.getElementById("popup").src=src;
}

function hide(){
document.getElementById("lightbox").style.display="none";
}

</script>

</body>
</html>
